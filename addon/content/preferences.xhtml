<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <html:p data-l10n-id="pref-lookup-description"></html:p>
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-lookup-similarity-threshold"
      data-l10n-id="pref-lookup-similarity-threshold"
    ></html:label>
    <html:input
      type="number"
      step="0.01"
      min="0"
      max="1"
      id="zotero-prefpane-__addonRef__-lookup-similarity-threshold"
    ></html:input>
  </hbox>
  <hbox align="center">
    <html:label
      for="zotero-prefpane-__addonRef__-lookup-interval-ms"
      data-l10n-id="pref-lookup-interval-ms"
    ></html:label>
    <html:input
      type="number"
      step="100"
      min="0"
      id="zotero-prefpane-__addonRef__-lookup-interval-ms"
    ></html:input>
  </hbox>
  <html:p data-l10n-id="pref-lookup-note"></html:p>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
